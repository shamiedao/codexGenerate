<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简单登录示例</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, #f0f4ff, #dbe8ff);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .card {
        width: min(90vw, 360px);
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(30, 58, 138, 0.15);
        padding: 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 22px;
      }

      .hint {
        color: #475569;
        font-size: 13px;
        margin-bottom: 14px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #1e293b;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        margin-bottom: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      #message {
        margin-top: 12px;
        min-height: 22px;
        font-size: 14px;
      }

      .ok {
        color: #166534;
      }

      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>登录系统</h1>
      <p class="hint">可使用 admin / 123456 或 demo / demo123 登录。</p>
      <form id="loginForm">
        <label for="username">用户名</label>
        <input id="username" name="username" required />

        <label for="password">密码</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">登录</button>
      </form>

      <div id="message"></div>
    </div>

    <script>
      const loginForm = document.getElementById('loginForm');
      const message = document.getElementById('message');

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
          username: loginForm.username.value.trim(),
          password: loginForm.password.value
        };

        message.className = '';
        message.textContent = '登录中...';

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          const result = await response.json();

          if (!response.ok) {
            message.className = 'error';
            message.textContent = result.message || '登录失败';
            return;
          }

          localStorage.setItem('auth_token', result.token);
          message.className = 'ok';
          message.textContent = `${result.message}，Token 已保存到 localStorage。`;
        } catch (error) {
          message.className = 'error';
          message.textContent = '网络错误，请稍后重试';
        }
      });
    </script>
  </body>
</html>
